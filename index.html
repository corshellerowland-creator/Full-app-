<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faceless Trader FIXED</title>
<style>
body{margin:0;font-family:sans-serif;background:#0a0615;color:white}
.tabs{display:flex;gap:10px;padding:10px}
.tab{padding:10px;border-radius:20px;background:#1b1230;cursor:pointer}
.active{background:linear-gradient(45deg,#ff4df0,#7a5cff)}
.section{display:none;padding:15px}
.section.active{display:block}
.card{background:#140a25;padding:15px;border-radius:15px;margin-top:10px}
</style>
</head>
<body>

<div class="tabs">
<div class="tab active" onclick="show('icc')">ICC</div>
<div class="tab" onclick="show('ema')">EMA</div>
<div class="tab" onclick="show('sd')">Supply & Demand</div>
</div>

<div id="icc" class="section active">
<div class="card">ICC Strategy (Indication → Correction → Continuation)</div>
</div>

<div id="ema" class="section">
<div class="card">EMA Strategy (Crossover / Pullback)</div>
</div>

<div id="sd" class="section">
<div class="card">Supply & Demand Strategy</div>
</div>

<script>
function show(id){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 event.target.classList.add('active');
}
</script>

</body>
</html>
